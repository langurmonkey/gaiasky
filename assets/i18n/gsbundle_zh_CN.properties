tip.35=在界面首选项中可以为 HiDPI 屏幕放大 UI
tip.36=可以在图形首选项中开启或关闭后期处理效果
tip.37=使用 | %%mono-big gaiasky --noscript | 启动 Gaia Sky 以禁止创建脚本服务器
tip.38=使用 | %%mono-big gaiasky -s | 启动 Gaia Sky 跳过欢迎窗口
tip.39=%%mono-big gaiasky -h | 显示所有命令行参数信息
tip.40=%%mono-big gaiasky -v | 显示版本信息
tip.41=使用 | %%mono-big -vr | 参数启动 Gaia Sky 以启用虚拟现实模式
tip.42=使用 | %%mono-big -e | 参数启动 Gaia Sky 以创建外部视图
tip.43=使用 | %%mono-big --debug | 启动 Gaia Sky 调试模式
tip.44=使用 | %%hud-header Dataset manager | 下载并管理数据集
tip.45=在游戏模式下，一些行星和卫星包含地形高度数据和重力
tip.46=Gaia Sky 可以通过 | %%hud-header SAMP | 与 Topcat 或 Aladin 等天文软件互操作
tip.47=随时按 | $$gamepad-start | 打开手柄 UI
tip.48=在对话框中使用 | $$gamepad-select | 或 | %%key-big Alt | 在“接受”和“取消”按钮之间切换焦点
tip.49=在对话框中使用 | $$gamepad-rb | 或 | %%key-big Tab | 切换到下一个标签页
tip.50=在对话框中使用 | $$gamepad-lb | 或 | %%key-big Shift+Tab | 切换到上一个标签页
tip.51=在对话框中使用 | $$gamepad-a | 或 | %%key-big Enter | 点击当前按钮或更改当前控件
tip.52=在对话框中使用 | $$gamepad-start | 以“接受”操作关闭
tip.53=在对话框中使用 | %%key-big Esc | 以“取消”操作关闭
tip.54=使用 | $$gamepad-x | 切换小地图
tip.55=在对话框中使用 | $$gamepad-dpad | 或 | $$gamepad-ls | 移动焦点
tip.56=使用 | $$gamepad-rs | 移动滑块、滚动面板或选择框
tip.57=按住 | %%key-big action.camera.speedup | 在导航时加快相机速度
tip.58=使用 | %%key-big action.toggle/camera.cinematic | 切换电影相机行为


